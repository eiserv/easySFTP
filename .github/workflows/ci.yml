name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  self-test:
    name: Self-test against a real SFTP server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start SFTP server
        run: |
          docker run -d --name sftp -p 2222:22 atmoz/sftp:alpine demo:demopass:::upload
          for i in $(seq 1 30); do
            nc -z localhost 2222 && exit 0
            sleep 1
          done
          echo "::error::SFTP server did not become ready"
          exit 1

      - name: Read host key fingerprints
        id: hostkey
        run: |
          sleep 2
          fps=$(ssh-keyscan -p 2222 localhost 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
          {
            echo 'fingerprints<<EOF'
            echo "$fps"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Host key fingerprints:"
          echo "$fps"

      - name: Create test content
        run: |
          mkdir -p site/assets
          echo "<h1>easySFTP</h1>" > site/index.html
          echo "body{}" > site/assets/style.css
          echo "do not upload" > site/debug.log

      - name: Dry run
        uses: ./
        with:
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./site/ => /upload/
          ignore: "*.log"
          dry-run: true

      - name: Verify dry run changed nothing
        run: |
          if [ -n "$(docker exec sftp ls /home/demo/upload)" ]; then
            echo "::error::dry-run created remote files"
            exit 1
          fi

      - name: Upload
        id: upload
        uses: ./
        with:
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./site/ => /upload/
          ignore: "*.log"

      - name: Verify upload
        run: |
          docker exec sftp test -f /home/demo/upload/index.html
          docker exec sftp test -f /home/demo/upload/assets/style.css
          if docker exec sftp test -e /home/demo/upload/debug.log; then
            echo "::error::ignored file was uploaded"
            exit 1
          fi
          [ "${{ steps.upload.outputs.files-uploaded }}" = "2" ]
          [ "${{ steps.upload.outputs.bytes-uploaded }}" -gt 0 ]

      - name: Plant stale remote file
        run: docker exec sftp sh -c 'echo stale > /home/demo/upload/stale.html && chown demo /home/demo/upload/stale.html'

      - name: Upload with delete mode
        id: clean-upload
        uses: ./
        with:
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./site/ => /upload/
          ignore: "*.log"
          delete: true

      - name: Verify delete mode
        run: |
          if docker exec sftp test -e /home/demo/upload/stale.html; then
            echo "::error::stale file survived delete mode"
            exit 1
          fi
          docker exec sftp test -f /home/demo/upload/index.html
          [ "${{ steps.clean-upload.outputs.files-deleted }}" -ge 1 ]

      - name: Verify wrong host key is rejected
        id: badkey
        continue-on-error: true
        uses: ./
        with:
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: "SHA256:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          uploads: ./site/ => /upload/

      - name: Assert wrong host key failed
        run: |
          [ "${{ steps.badkey.outcome }}" = "failure" ]
