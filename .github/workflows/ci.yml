name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  action-tests:
    name: Action launcher and metadata (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint shell scripts
        if: runner.os == 'Linux'
        run: shellcheck scripts/*.sh

      - name: Test action launcher modes and validation
        shell: bash
        run: bash scripts/test-action.sh

      - name: Validate action metadata
        run: go test ./internal/actionmeta

  test:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  self-test:
    name: Self-test against a real SFTP server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start SFTP server
        run: |
          docker run -d --name sftp -p 2222:22 atmoz/sftp:alpine demo:demopass:::upload
          for i in $(seq 1 30); do
            nc -z localhost 2222 && exit 0
            sleep 1
          done
          echo "::error::SFTP server did not become ready"
          exit 1

      - name: Read host key fingerprints
        id: hostkey
        run: |
          sleep 2
          fps=$(ssh-keyscan -p 2222 localhost 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
          {
            echo 'fingerprints<<EOF'
            echo "$fps"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Host key fingerprints:"
          echo "$fps"

      - name: Create test content
        run: |
          mkdir -p selftest-site/assets
          echo "<h1>easySFTP</h1>" > selftest-site/index.html
          echo "body{}" > selftest-site/assets/style.css
          echo "do not upload" > selftest-site/debug.log

      - name: Dry run
        uses: ./
        with:
          build-mode: source
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./selftest-site/ => /upload/
          ignore: "*.log"
          dry-run: true

      - name: Verify dry run changed nothing
        run: |
          if [ -n "$(docker exec sftp ls /home/demo/upload)" ]; then
            echo "::error::dry-run created remote files"
            exit 1
          fi

      - name: Upload
        id: upload
        uses: ./
        with:
          build-mode: source
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./selftest-site/ => /upload/
          ignore: "*.log"

      - name: Verify upload
        run: |
          docker exec sftp test -f /home/demo/upload/index.html
          docker exec sftp test -f /home/demo/upload/assets/style.css
          if docker exec sftp test -e /home/demo/upload/debug.log; then
            echo "::error::ignored file was uploaded"
            exit 1
          fi
          [ "${{ steps.upload.outputs.files-uploaded }}" = "2" ]
          [ "${{ steps.upload.outputs.bytes-uploaded }}" -gt 0 ]

      - name: Plant stale remote file
        run: docker exec sftp sh -c 'echo stale > /home/demo/upload/stale.html && chown demo /home/demo/upload/stale.html'

      - name: Upload with clean strategy
        id: clean-upload
        uses: ./
        with:
          build-mode: source
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./selftest-site/ => /upload/
          ignore: "*.log"
          strategy: clean

      - name: Verify clean strategy
        run: |
          if docker exec sftp test -e /home/demo/upload/stale.html; then
            echo "::error::stale file survived the clean strategy"
            exit 1
          fi
          docker exec sftp test -f /home/demo/upload/index.html
          [ "${{ steps.clean-upload.outputs.files-deleted }}" -ge 1 ]

      # config-file end-to-end: unit tests set EASYSFTP_* variables directly
      # and never see action.yml's declared defaults; only a real composite
      # run does. This is how #62 (a declared default tripping the config-file
      # mutual-exclusion check) shipped despite green CI.
      - name: Create config-file deployment
        run: |
          mkdir -p selftest-docs
          echo "# docs" > selftest-docs/readme.md
          cat > selftest-config.yml <<'EOF'
          version: 1
          ignore:
            - "*.log"
          targets:
            - local: ./selftest-site/
              remote: /upload/cfg-site/
            - local: ./selftest-docs/
              remote: /upload/cfg-docs/
              strategy: clean
          EOF

      - name: Deploy via config-file
        id: cfgfile
        uses: ./
        with:
          build-mode: source
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          config-file: selftest-config.yml

      - name: Verify config-file deploy
        run: |
          docker exec sftp test -f /home/demo/upload/cfg-site/index.html
          docker exec sftp test -f /home/demo/upload/cfg-site/assets/style.css
          docker exec sftp test -f /home/demo/upload/cfg-docs/readme.md
          if docker exec sftp test -e /home/demo/upload/cfg-site/debug.log; then
            echo "::error::config-file global ignore was not applied"
            exit 1
          fi
          [ "${{ steps.cfgfile.outputs.files-uploaded }}" = "3" ]

      # sync round-trip against a real OpenSSH server: manifest written,
      # read back on the next run, deletions tracked, unchanged files skipped.
      - name: Sync (first run)
        id: sync1
        uses: ./
        with:
          build-mode: source
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./selftest-site/ => /upload/sync/
          ignore: "*.log"
          strategy: sync

      - name: Verify first sync wrote the manifest
        run: |
          docker exec sftp test -f /home/demo/upload/sync/index.html
          docker exec sftp test -f /home/demo/upload/sync/assets/style.css
          docker exec sftp test -f /home/demo/upload/sync/.easysftp-manifest.json
          [ "${{ steps.sync1.outputs.files-uploaded }}" = "2" ]

      - name: Remove a local file
        run: rm selftest-site/assets/style.css

      - name: Sync (second run)
        id: sync2
        uses: ./
        with:
          build-mode: source
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: ${{ steps.hostkey.outputs.fingerprints }}
          uploads: ./selftest-site/ => /upload/sync/
          ignore: "*.log"
          strategy: sync

      - name: Verify second sync deleted the removed file and skipped the rest
        run: |
          if docker exec sftp test -e /home/demo/upload/sync/assets/style.css; then
            echo "::error::locally removed file survived the second sync"
            exit 1
          fi
          docker exec sftp test -f /home/demo/upload/sync/index.html
          [ "${{ steps.sync2.outputs.files-deleted }}" = "1" ]
          [ "${{ steps.sync2.outputs.files-skipped }}" -ge 1 ]
          [ "${{ steps.sync2.outputs.files-uploaded }}" = "0" ]

      - name: Verify wrong host key is rejected
        id: badkey
        continue-on-error: true
        uses: ./
        with:
          build-mode: source
          server: localhost
          port: 2222
          username: demo
          password: demopass
          host-key-fingerprint: "SHA256:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          uploads: ./selftest-site/ => /upload/

      - name: Assert wrong host key failed
        run: |
          [ "${{ steps.badkey.outcome }}" = "failure" ]
