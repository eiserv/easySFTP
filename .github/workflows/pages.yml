name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "CONTRIBUTING.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assemble site
        # The site renders the repo's own markdown; copy it in so the
        # published docs always match the checked-out revision.
        run: |
          mkdir -p _site/content
          cp -r site/. _site/
          cp docs/configuration.md docs/strategies.md docs/examples.md \
             docs/security.md docs/troubleshooting.md _site/content/
          cp CONTRIBUTING.md _site/content/contributing.md
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
